services:
  k6:
    image: grafana/k6:latest
    container_name: intra-k6
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      BASE_URL: "${K6_BASE_URL:-http://host.docker.internal:8080}"
      DEV_LOGIN_EMAIL: "${K6_DEV_LOGIN_EMAIL:-oleksandr.bondarenko@intra.com}"
      K6_WEB_DASHBOARD: "true"
      K6_WEB_DASHBOARD_EXPORT: "/results/${K6_REPORT_NAME:-report}.html"
      K6_SUMMARY_EXPORT: "/results/${K6_REPORT_NAME:-report}.summary.json"
    volumes:
      - ./scripts:/scripts:ro
      - ./results:/results
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    entrypoint: ["k6"]
