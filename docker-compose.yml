version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: intra
    environment:
      MYSQL_ROOT_PASSWORD: "${DATABASE_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DATABASE_NAME}"
    ports:
      - "${DATABASE_PORT}:3306"
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: bridge